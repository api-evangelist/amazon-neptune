name: Amazon Neptune
description: >-
  Amazon Neptune is a fast, reliable, fully managed graph database service
  that makes it easy to build and run applications that work with highly
  connected datasets. It supports property graph and RDF models, with
  multiple query languages including Gremlin, SPARQL, and openCypher.
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
tags:
- AWS
- Database
- Graph Database
- Gremlin
- Neptune
- Property Graph
- RDF
- SPARQL
created: '2024'
modified: '2026-04-19'
