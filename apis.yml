- name: Amazon Neptune API
  description: Amazon Neptune REST API for managing Neptune database clusters, instances, and related resources
  image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
  humanUrl: https://aws.amazon.com/neptune/
