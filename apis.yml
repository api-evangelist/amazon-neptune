- name: Neptune Analytics API
  description: >-
    Neptune Analytics is a memory-optimized graph database engine for
    analytics, providing optimized graph analytic algorithms, low-latency
    queries, and vector search capabilities within graph traversals.
  image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
