- name: Neptune Streams API
  description: >-
    Neptune Streams generates a complete sequence of change-log entries that
    record every change made to graph data as it happens, enabling real-time
    capture of graph mutations via a REST API.
  image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
  humanUrl: https://docs.aws.amazon.com/neptune/latest/userguide/streams.html
  baseUrl: https://{cluster-endpoint}:8182
