- name: Neptune ML API
  description: >-
    Neptune ML enables machine learning on graph data using graph neural
    networks. It provides APIs for data processing, model training, and
    inference endpoint management powered by Amazon SageMaker.
  image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
  humanUrl: https://aws.amazon.com/neptune/machine-learning/
  baseUrl: https://{cluster-endpoint}:8182/ml
  tags:
  - Machine Learning
  - Graph Neural Network
  - Predictions
  - SageMaker
