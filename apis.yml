- name: Neptune Loader API
  description: >-
    Neptune bulk loader API for ingesting large volumes of data from Amazon
    S3 into a Neptune DB instance. It supports CSV formats for property
    graphs and multiple RDF serialization formats.
  image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
  humanUrl: https://docs.aws.amazon.com/neptune/latest/userguide/bulk-load.html
  baseUrl: https://{cluster-endpoint}:8182/loader
