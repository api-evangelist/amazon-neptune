- name: Neptune Gremlin API
  description: >-
    Apache TinkerPop Gremlin graph traversal language API for querying
    property graphs in Neptune. It supports both WebSocket and HTTP REST
    endpoints for submitting Gremlin traversals.
  image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
  humanUrl: https://docs.aws.amazon.com/neptune/latest/userguide/access-graph-gremlin.html
  baseUrl: wss://{cluster-endpoint}:8182/gremlin
  tags:
  - Gremlin
  - Graph Traversal
  - Property Graph
  - Query Language
  properties:
