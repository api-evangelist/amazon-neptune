components:
  securitySchemes:
    aws_sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4 authentication
  schemas:
    ErrorResponse:
      type: object
      properties:
        requestId:
          type: string
        code:
          type: string
        detailedMessage:
          type: string
    ExecuteGremlinQueryInput:
      type: object
      required:
      - gremlin
      properties:
        gremlin:
          type: string
          description: The Gremlin traversal query string to execute.
    ExecuteGremlinQueryOutput:
      type: object
      properties:
        requestId:
          type: string
        status:
          type: object
          properties:
            message:
              type: string
            code:
              type: integer
        result:
          type: object
          properties:
            data:
              description: The query result data.
    ExecuteGremlinProfileInput:
      type: object
      required:
      - gremlin
      properties:
        gremlin:
          type: string
          description: The Gremlin traversal query string to profile.
        results:
          type: boolean
          description: Whether to include results in the profile output.
        chop:
          type: integer
          description: Maximum length of result string per entry.
        serializer:
          type: string
          description: The serialization format for results.
        indexOps:
          type: boolean
          description: Whether to include index operation details.
    GremlinQueryStatusOutput:
      type: object
      properties:
        acceptedQueryCount:
          type: integer
        runningQueryCount:
          type: integer
        queries:
          type: array
          items:
            $ref: '#/components/schemas/GremlinQueryStatus'
    GremlinQueryStatus:
      type: object
      properties:
        queryId:
          type: string
        queryString:
          type: string
        queryEvalStats:
          type: object
          properties:
            waited:
              type: integer
            elapsed:
              type: integer
            cancelled:
              type: boolean
    ExecuteOpenCypherQueryInput:
      type: object
      required:
      - query
      properties:
        query:
          type: string
          description: The openCypher query string to execute.
        parameters:
          type: string
          description: >-
            The openCypher query parameters as a JSON-serialized string.
    ExecuteOpenCypherQueryOutput:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
          description: The query result rows.
    ExecuteOpenCypherExplainInput:
      type: object
      required:
      - query
      properties:
        query:
          type: string
          description: The openCypher query to explain.
        parameters:
          type: string
        explainMode:
          type: string
          enum:
          - static
          - dynamic
          - details
          description: The explain mode (static, dynamic, or details).
    OpenCypherQueryStatusOutput:
      type: object
      properties:
        acceptedQueryCount:
          type: integer
        runningQueryCount:
          type: integer
        queries:
          type: array
          items:
            type: object
            properties:
              queryId:
                type: string
              queryString:
                type: string
              queryEvalStats:
                type: object
    ExecuteSparqlQueryInput:
      type: object
      properties:
        query:
          type: string
          description: The SPARQL query string (for SELECT, ASK, CONSTRUCT, DESCRIBE).
        update:
          type: string
          description: The SPARQL update string (for INSERT, DELETE operations).
    SparqlQueryOutput:
      type: object
      properties:
        head:
          type: object
          properties:
            vars:
              type: array
              items:
                type: string
        results:
          type: object
          properties:
            bindings:
              type: array
              items:
                type: object
    EngineStatusOutput:
      type: object
      properties:
        status:
          type: string
          description: The status of the Neptune engine (healthy, recovery, etc.).
        startTime:
          type: string
          description: The start time of the engine.
        dbEngineVersion:
          type: string
          description: The Neptune engine version.
        role:
          type: string
          description: The cluster role (writer or reader).
        dfeQueryEngine:
          type: string
          description: The DFE query engine status (enabled or viaQueryHint).
        gremlin:
          type: object
          properties:
            version:
              type: string
        sparql:
          type: object
          properties:
            version:
              type: string
        opencypher:
          type: object
          properties:
            version:
              type: string
        labMode:
          type: object
          additionalProperties:
            type: string
        features:
          type: object
          additionalProperties:
            type: object
    PropertygraphStatisticsOutput:
      type: object
      properties:
        status:
          type: string
        payload:
          type: object
          properties:
            graphStatistics:
              type: object
              properties:
                numNodes:
                  type: integer
                numEdges:
                  type: integer
                numNodeLabels:
                  type: integer
                numEdgeLabels:
                  type: integer
                numNodeProperties:
                  type: integer
                numEdgeProperties:
                  type: integer
    SparqlStatisticsOutput:
      type: object
      properties:
        status:
          type: string
        payload:
          type: object
          properties:
            graphStatistics:
              type: object
              properties:
                numStatements:
                  type: integer
                numDistinctSubjects:
                  type: integer
                numDistinctPredicates:
                  type: integer
    StartLoaderJobInput:
      type: object
      required:
      - source
      - format
      - iamRoleArn
      - region
      properties:
        source:
          type: string
          description: >-
            Amazon S3 URI identifying files or folders to load (s3://bucket/key).
        format:
          type: string
          description: The data format of the files to load.
          enum:
          - csv
          - opencypher
          - ntriples
          - nquads
          - rdfxml
          - turtle
        iamRoleArn:
          type: string
          description: The ARN of the IAM role with S3 access.
        region:
          type: string
          description: The AWS Region of the S3 bucket.
        mode:
          type: string
          description: The load mode.
          enum:
          - NEW
          - RESUME
          - AUTO
          default: AUTO
        failOnError:
          type: string
          description: Whether to stop the load job on error.
          enum:
          - 'TRUE'
          - 'FALSE'
          default: 'TRUE'
        parallelism:
          type: string
          description: The degree of parallelism for loading.
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - OVERSUBSCRIBE
          default: HIGH
        parserConfiguration:
          type: object
          description: Optional parser configuration settings.
          properties:
            baseUri:
              type: string
            namedGraphUri:
              type: string
            allowEmptyStrings:
              type: boolean
        updateSingleCardinalityProperties:
          type: string
          description: Whether to update existing single-cardinality properties.
          enum:
          - 'TRUE'
          - 'FALSE'
          default: 'FALSE'
        queueRequest:
          type: string
          description: Whether to queue the request if a load is already running.
          enum:
          - 'TRUE'
          - 'FALSE'
          default: 'FALSE'
        dependencies:
          type: array
          description: Load job IDs that must complete before this job runs.
          items:
            type: string
        userProvidedEdgeIds:
          type: string
          description: For openCypher format, whether edge IDs are provided.
          enum:
          - 'TRUE'
          - 'FALSE'
    StartLoaderJobOutput:
      type: object
      properties:
        status:
          type: string
        payload:
          type: object
          properties:
            loadId:
              type: string
              description: The unique identifier for the load job.
    LoaderJobStatusOutput:
      type: object
      properties:
        status:
          type: string
        payload:
          type: object
          properties:
            feedCount:
              type: array
              items:
                type: object
            overallStatus:
              type: object
              properties:
                fullUri:
                  type: string
                runNumber:
                  type: integer
                retryNumber:
                  type: integer
                status:
                  type: string
                totalTimeSpent:
                  type: integer
                startTime:
                  type: integer
                totalRecords:
                  type: integer
                totalDuplicates:
                  type: integer
                parsingErrors:
                  type: integer
                datatypeMismatchErrors:
                  type: integer
                insertErrors:
                  type: integer
    PropertygraphStreamOutput:
      type: object
      properties:
        lastEventId:
          type: object
          properties:
            commitNum:
              type: integer
            opNum:
              type: integer
        lastTrxTimestampInMillis:
          type: integer
          description: Timestamp of the last transaction in milliseconds.
        format:
          type: string
          enum:
          - PG_JSON
        records:
          type: array
          items:
            $ref: '#/components/schemas/PropertygraphStreamRecord'
        totalRecords:
          type: integer
    PropertygraphStreamRecord:
      type: object
      properties:
        commitTimestampInMillis:
          type: integer
        eventId:
          type: object
          properties:
            commitNum:
              type: integer
            opNum:
              type: integer
        data:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
              description: >-
                The type of the element (v=vertex, vl=vertex label,
                vp=vertex property, e=edge, ep=edge property).
            key:
              type: string
            value:
              type: object
              properties:
                value:
                  description: The property value.
                dataType:
                  type: string
            from:
              type: string
              description: Source vertex ID (for edges only).
            to:
              type: string
              description: Target vertex ID (for edges only).
        op:
          type: string
          enum:
          - ADD
          - REMOVE
        isLastOp:
          type: boolean
    SparqlStreamOutput:
      type: object
      properties:
        lastEventId:
          type: object
          properties:
            commitNum:
              type: integer
            opNum:
              type: integer
        lastTrxTimestampInMillis:
          type: integer
        format:
          type: string
          enum:
          - NQUADS
        records:
          type: array
          items:
            type: object
            properties:
              commitTimestampInMillis:
                type: integer
              eventId:
                type: object
                properties:
                  commitNum:
                    type: integer
                  opNum:
                    type: integer
              data:
                type: object
                properties:
                  stmt:
                    type: string
                    description: The N-Quads statement.
              op:
                type: string
                enum:
                - ADD
                - REMOVE
              isLastOp:
                type: boolean
        totalRecords:
          type: integer
    StartMLDataProcessingJobInput:
      type: object
      required:
      - inputDataS3Location
      - processedDataS3Location
      properties:
        id:
          type: string
          description: Unique identifier for the job (auto-generated if omitted).
        inputDataS3Location:
          type: string
          description: S3 URI for input data.
        processedDataS3Location:
          type: string
          description: S3 URI for output results.
        previousDataProcessingJobId:
          type: string
          description: Job ID of a previous job for incremental processing.
        sagemakerIamRoleArn:
          type: string
          description: IAM role ARN for SageMaker execution.
        neptuneIamRoleArn:
          type: string
          description: IAM role ARN for Neptune access.
        processingInstanceType:
          type: string
          description: ML instance type (default auto-selected ml.r5 type).
        processingInstanceVolumeSizeInGB:
          type: integer
          description: Disk volume size in GB (default 0 = auto-selected).
        processingTimeOutInSeconds:
          type: integer
          description: Timeout in seconds (default 86400).
        modelType:
          type: string
          description: Model type selection.
          enum:
          - heterogeneous
          - kge
        configFileName:
          type: string
          description: Data specification file name.
          default: training-data-configuration.json
        subnets:
          type: array
          items:
            type: string
          description: Subnet IDs in Neptune VPC.
        securityGroupIds:
          type: array
          items:
            type: string
          description: VPC security group IDs.
        volumeEncryptionKMSKey:
          type: string
        s3OutputEncryptionKMSKey:
          type: string
        enableInterContainerTrafficEncryption:
          type: boolean
          default: true
    StartMLModelTrainingJobInput:
      type: object
      required:
      - dataProcessingJobId
      - trainModelS3Location
      properties:
        id:
          type: string
        dataProcessingJobId:
          type: string
          description: Job ID of the completed data processing job.
        trainModelS3Location:
          type: string
          description: S3 location for model artifacts.
        previousModelTrainingJobId:
          type: string
        sagemakerIamRoleArn:
          type: string
        neptuneIamRoleArn:
          type: string
        modelName:
          type: string
          description: The model type to use.
          enum:
          - rgcn
          - transe
          - distmult
          - rotate
          - custom
        baseProcessingInstanceType:
          type: string
        trainingInstanceType:
          type: string
          default: ml.p3.2xlarge
        trainingInstanceVolumeSizeInGB:
          type: integer
        trainingTimeOutInSeconds:
          type: integer
          default: 86400
        maxHPONumberOfTrainingJobs:
          type: integer
          default: 2
        maxHPOParallelTrainingJobs:
          type: integer
          default: 2
        subnets:
          type: array
          items:
            type: string
        securityGroupIds:
          type: array
          items:
            type: string
        volumeEncryptionKMSKey:
          type: string
        s3OutputEncryptionKMSKey:
          type: string
        enableInterContainerTrafficEncryption:
          type: boolean
          default: true
        enableManagedSpotTraining:
          type: boolean
          default: false
        customModelTrainingParameters:
          type: object
