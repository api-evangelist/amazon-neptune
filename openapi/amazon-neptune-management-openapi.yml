        '404':
          description: The specified resource was not found.
components:
  securitySchemes:
    aws_sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4 authentication
  schemas:
    DBCluster:
      type: object
      description: Contains the details of an Amazon Neptune DB cluster.
      properties:
        DBClusterIdentifier:
          type: string
          description: The user-supplied DB cluster identifier.
        DBClusterArn:
          type: string
          description: The Amazon Resource Name (ARN) for the DB cluster.
        Status:
          type: string
          description: Current state of the cluster.
        Engine:
          type: string
          description: The database engine (neptune).
        EngineVersion:
          type: string
          description: The version of the database engine.
        Endpoint:
          type: string
          description: The connection endpoint for the primary instance.
        ReaderEndpoint:
          type: string
          description: The reader endpoint for read replicas.
        Port:
          type: integer
          description: The port that the DB cluster listens on.
        MasterUsername:
          type: string
          description: The master username for the cluster.
        DBClusterParameterGroup:
          type: string
          description: The name of the DB cluster parameter group.
        DBSubnetGroup:
          type: string
          description: The DB subnet group associated with the cluster.
        AllocatedStorage:
          type: integer
          description: The allocated storage size in gigabytes.
        ClusterCreateTime:
          type: string
          format: date-time
          description: The time when the DB cluster was created.
        PreferredBackupWindow:
          type: string
          description: The daily time range for automated backups.
        PreferredMaintenanceWindow:
          type: string
          description: The weekly time range for system maintenance.
        MultiAZ:
          type: boolean
          description: Whether the cluster is Multi-AZ enabled.
        StorageEncrypted:
          type: boolean
          description: Whether the cluster storage is encrypted.
        KmsKeyId:
          type: string
          description: The KMS key identifier for encrypted clusters.
        DeletionProtection:
          type: boolean
          description: Whether deletion protection is enabled.
        IAMDatabaseAuthenticationEnabled:
          type: boolean
          description: Whether IAM database authentication is enabled.
        DBClusterMembers:
          type: array
          description: The list of instances in the cluster.
          items:
            $ref: '#/components/schemas/DBClusterMember'
        AssociatedRoles:
          type: array
          description: IAM roles associated with the cluster.
          items:
            $ref: '#/components/schemas/DBClusterRole'
    DBClusterMember:
      type: object
      description: A member instance of a Neptune DB cluster.
      properties:
        DBInstanceIdentifier:
          type: string
          description: The instance identifier.
        IsClusterWriter:
          type: boolean
          description: Whether the instance is the primary (writer) instance.
        DBClusterParameterGroupStatus:
          type: string
          description: The status of the parameter group for this member.
        PromotionTier:
          type: integer
          description: Failover priority for the instance.
    DBClusterRole:
      type: object
      description: An IAM role associated with a Neptune DB cluster.
      properties:
        RoleArn:
          type: string
          description: The ARN of the IAM role.
        Status:
          type: string
          description: The status of the association (active, pending, error).
    DBInstance:
      type: object
      description: Contains the details of an Amazon Neptune DB instance.
      properties:
        DBInstanceIdentifier:
          type: string
          description: The user-supplied database identifier.
        DBInstanceClass:
          type: string
          description: The compute and memory capacity of the instance.
        Engine:
          type: string
          description: The database engine (neptune).
        DBInstanceStatus:
          type: string
          description: Current state of the instance.
        Endpoint:
          type: object
          properties:
            Address:
              type: string
            Port:
              type: integer
        DBClusterIdentifier:
          type: string
          description: The cluster this instance belongs to.
        AvailabilityZone:
          type: string
          description: The Availability Zone of the instance.
        PreferredMaintenanceWindow:
          type: string
          description: The weekly time range for system maintenance.
        EngineVersion:
          type: string
          description: The version of the database engine.
        AutoMinorVersionUpgrade:
          type: boolean
          description: Whether minor version upgrades are applied automatically.
        PubliclyAccessible:
          type: boolean
          description: Whether the instance is publicly accessible.
        DBInstanceArn:
          type: string
          description: The ARN of the DB instance.
        PromotionTier:
          type: integer
          description: The failover priority for the instance.
        StorageEncrypted:
          type: boolean
          description: Whether the instance storage is encrypted.
    DBClusterSnapshot:
      type: object
      description: Contains the details of a Neptune DB cluster snapshot.
      properties:
        DBClusterSnapshotIdentifier:
          type: string
          description: The identifier of the cluster snapshot.
        DBClusterIdentifier:
          type: string
          description: The cluster identifier of the source cluster.
        SnapshotCreateTime:
          type: string
          format: date-time
        Engine:
          type: string
        EngineVersion:
          type: string
        Status:
          type: string
          description: The status of the snapshot.
        AllocatedStorage:
          type: integer
        VpcId:
          type: string
        Port:
          type: integer
        StorageEncrypted:
          type: boolean
        KmsKeyId:
          type: string
        DBClusterSnapshotArn:
          type: string
        SnapshotType:
          type: string
          description: The type of the snapshot (manual or automated).
    DBSubnetGroup:
      type: object
      description: Contains the details of a Neptune DB subnet group.
      properties:
        DBSubnetGroupName:
          type: string
        DBSubnetGroupDescription:
          type: string
        VpcId:
          type: string
        SubnetGroupStatus:
          type: string
        Subnets:
          type: array
          items:
            type: object
            properties:
              SubnetIdentifier:
                type: string
              SubnetAvailabilityZone:
                type: object
                properties:
                  Name:
                    type: string
              SubnetStatus:
                type: string
        DBSubnetGroupArn:
          type: string
    CreateDBClusterRequest:
      type: object
      required:
        - DBClusterIdentifier
        - Engine
      properties:
        DBClusterIdentifier:
          type: string
          description: The DB cluster identifier.
        Engine:
          type: string
          description: The database engine to use (neptune).
          default: neptune
        EngineVersion:
          type: string
          description: The version of the Neptune engine.
        Port:
          type: integer
          description: The port number on which the cluster accepts connections.
          default: 8182
        DBSubnetGroupName:
          type: string
          description: The name of a DB subnet group.
        VpcSecurityGroupIds:
          type: array
          items:
            type: string
          description: A list of VPC security group IDs.
        StorageEncrypted:
          type: boolean
          description: Whether the cluster is encrypted.
        KmsKeyId:
          type: string
          description: The KMS key identifier for an encrypted cluster.
        PreferredBackupWindow:
          type: string
          description: The daily time range for automated backups (UTC).
        PreferredMaintenanceWindow:
          type: string
          description: The weekly time range for maintenance (UTC).
        BackupRetentionPeriod:
          type: integer
          description: The number of days for which automated backups are retained (1-35).
        DeletionProtection:
          type: boolean
          description: Whether to enable deletion protection.
        IAMDatabaseAuthenticationEnabled:
          type: boolean
          description: Whether to enable IAM database authentication.
    ModifyDBClusterRequest:
      type: object
      required:
        - DBClusterIdentifier
      properties:
        DBClusterIdentifier:
          type: string
          description: The DB cluster identifier.
        NewDBClusterIdentifier:
          type: string
          description: The new cluster identifier when renaming.
        EngineVersion:
          type: string
          description: The version of the Neptune engine to upgrade to.
        Port:
          type: integer
          description: The port number on which the cluster accepts connections.
        DBClusterParameterGroupName:
          type: string
          description: The name of the cluster parameter group to use.
        VpcSecurityGroupIds:
          type: array
          items:
            type: string
        BackupRetentionPeriod:
          type: integer
        PreferredBackupWindow:
          type: string
        PreferredMaintenanceWindow:
          type: string
        DeletionProtection:
          type: boolean
        ApplyImmediately:
          type: boolean
          description: Whether to apply changes immediately or during the next maintenance window.
    CreateDBInstanceRequest:
      type: object
      required:
        - DBInstanceIdentifier
        - DBInstanceClass
        - Engine
        - DBClusterIdentifier
      properties:
        DBInstanceIdentifier:
          type: string
          description: The DB instance identifier.
        DBInstanceClass:
          type: string
          description: The compute and memory capacity of the instance.
        Engine:
          type: string
          description: The database engine to use (neptune).
          default: neptune
        DBClusterIdentifier:
          type: string
          description: The identifier of the DB cluster to add the instance to.
        AvailabilityZone:
          type: string
          description: The Availability Zone for the instance.
        PreferredMaintenanceWindow:
          type: string
        AutoMinorVersionUpgrade:
          type: boolean
        PromotionTier:
          type: integer
          description: Failover priority (0-15).
          minimum: 0
          maximum: 15
    ModifyDBInstanceRequest:
      type: object
      required:
        - DBInstanceIdentifier
      properties:
        DBInstanceIdentifier:
          type: string
          description: The DB instance identifier.
        DBInstanceClass:
          type: string
          description: The new compute and memory capacity.
        PreferredMaintenanceWindow:
          type: string
        AutoMinorVersionUpgrade:
          type: boolean
        NewDBInstanceIdentifier:
          type: string
        PromotionTier:
          type: integer
        ApplyImmediately:
          type: boolean
    RestoreDBClusterFromSnapshotRequest:
      type: object
      required:
        - DBClusterIdentifier
        - SnapshotIdentifier
        - Engine
      properties:
        DBClusterIdentifier:
          type: string
          description: The name of the new DB cluster.
        SnapshotIdentifier:
          type: string
          description: The identifier of the snapshot to restore from.
        Engine:
          type: string
          description: The database engine to use.
          default: neptune
        EngineVersion:
          type: string
        Port:
          type: integer
        DBSubnetGroupName:
          type: string
        VpcSecurityGroupIds:
          type: array
          items:
            type: string
        DeletionProtection:
          type: boolean
        IAMDatabaseAuthenticationEnabled:
          type: boolean
    DescribeDBClustersResponse:
      type: object
      properties:
        DBClusters:
          type: array
          items:
            $ref: '#/components/schemas/DBCluster'
        Marker:
          type: string
    DescribeDBInstancesResponse:
      type: object
      properties:
        DBInstances:
          type: array
          items:
            $ref: '#/components/schemas/DBInstance'
        Marker:
          type: string
    DescribeDBClusterSnapshotsResponse:
      type: object
      properties:
        DBClusterSnapshots:
          type: array
          items:
            $ref: '#/components/schemas/DBClusterSnapshot'
        Marker:
          type: string
    DescribeDBSubnetGroupsResponse:
      type: object
      properties:
        DBSubnetGroups:
          type: array
          items:
            $ref: '#/components/schemas/DBSubnetGroup'
        Marker:
          type: string
