          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Successful response with tags.
        '404':
          description: The specified resource was not found.
  /?Action=DescribeDBEngineVersions:
    get:
      operationId: describeDBEngineVersions
      summary: Describe Neptune DB engine versions
      description: >-
        Returns a list of the available DB engine versions. The output shows
        the supported features and parameter group families for each version.
      tags:
        - Engine
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - DescribeDBEngineVersions
        - name: Engine
          in: query
          description: The database engine to return versions for.
          schema:
            type: string
            default: neptune
        - name: EngineVersion
          in: query
          description: A specific engine version to return details for.
          schema:
            type: string
        - name: DBParameterGroupFamily
          in: query
          description: The parameter group family to filter versions by.
          schema:
            type: string
        - name: MaxRecords
          in: query
          schema:
            type: integer
        - name: Marker
          in: query
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Successful response with engine version details.
  /?Action=CreateGlobalCluster:
    post:
      operationId: createGlobalCluster
      summary: Create a Neptune global database cluster
      description: >-
        Creates a Neptune global database spread across multiple AWS Regions.
        The global database contains a single primary cluster with read-write
        capability.
      tags:
        - Global Clusters
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - CreateGlobalCluster
        - name: GlobalClusterIdentifier
          in: query
          required: true
          description: The cluster identifier of the new global cluster.
          schema:
            type: string
        - name: SourceDBClusterIdentifier
          in: query
          description: The ARN of an existing Neptune cluster to use as the primary cluster.
          schema:
            type: string
        - name: DeletionProtection
          in: query
          description: Whether the global cluster has deletion protection enabled.
          schema:
            type: boolean
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Global cluster created successfully.
        '400':
          description: Invalid request parameters.
  /?Action=DescribeGlobalClusters:
    get:
      operationId: describeGlobalClusters
      summary: Describe Neptune global database clusters
      description: >-
        Returns information about Neptune global database clusters.
      tags:
        - Global Clusters
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - DescribeGlobalClusters
        - name: GlobalClusterIdentifier
          in: query
          description: The identifier of the global cluster to describe.
          schema:
            type: string
        - name: MaxRecords
          in: query
          schema:
            type: integer
        - name: Marker
          in: query
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Successful response with global cluster details.
  /?Action=DescribePendingMaintenanceActions:
    get:
      operationId: describePendingMaintenanceActions
      summary: Describe pending maintenance actions
      description: >-
        Returns a list of resources with pending maintenance actions.
      tags:
        - Maintenance
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - DescribePendingMaintenanceActions
        - name: ResourceIdentifier
          in: query
          description: The ARN of a resource to filter maintenance actions.
          schema:
            type: string
        - name: MaxRecords
          in: query
          schema:
            type: integer
        - name: Marker
          in: query
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Successful response with pending maintenance actions.
  /?Action=ApplyPendingMaintenanceAction:
    post:
      operationId: applyPendingMaintenanceAction
      summary: Apply a pending maintenance action
      description: >-
        Applies a pending maintenance action to a resource.
      tags:
        - Maintenance
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - ApplyPendingMaintenanceAction
        - name: ResourceIdentifier
          in: query
          required: true
          description: The ARN of the resource to apply the action to.
          schema:
            type: string
        - name: ApplyAction
          in: query
          required: true
          description: The pending maintenance action to apply.
          schema:
            type: string
        - name: OptInType
          in: query
          required: true
          description: The type of opt-in request (immediate, next-maintenance, undo-opt-in).
          schema:
            type: string
            enum:
              - immediate
              - next-maintenance
              - undo-opt-in
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
