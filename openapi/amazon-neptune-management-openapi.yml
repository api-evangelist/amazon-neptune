  /?Action=CreateEventSubscription:
    post:
      operationId: createEventSubscription
      summary: Create a Neptune event notification subscription
      description: >-
        Creates an event notification subscription. This action requires an
        Amazon SNS topic ARN. Notifications are sent to the SNS topic when
        specified events occur.
      tags:
        - Events
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - CreateEventSubscription
        - name: SubscriptionName
          in: query
          required: true
          description: The name of the subscription.
          schema:
            type: string
        - name: SnsTopicArn
          in: query
          required: true
          description: The ARN of the SNS topic to send notifications to.
          schema:
            type: string
        - name: SourceType
          in: query
          description: >-
            The type of source that triggers notifications (db-instance,
            db-cluster, db-parameter-group, db-cluster-snapshot).
          schema:
            type: string
        - name: Enabled
          in: query
          description: Whether the subscription is enabled.
          schema:
            type: boolean
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Event subscription created successfully.
        '400':
          description: Invalid request parameters.
  /?Action=DescribeEvents:
    get:
      operationId: describeEvents
      summary: Describe Neptune events
      description: >-
        Returns events related to DB instances, DB clusters, DB parameter
        groups, and DB cluster snapshots for the past 14 days.
      tags:
        - Events
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - DescribeEvents
        - name: SourceIdentifier
          in: query
          description: The identifier of the event source to filter events.
          schema:
            type: string
        - name: SourceType
          in: query
          description: The event source type to filter events.
          schema:
            type: string
        - name: Duration
          in: query
          description: The number of minutes to retrieve events for.
          schema:
            type: integer
        - name: MaxRecords
          in: query
          schema:
            type: integer
        - name: Marker
          in: query
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Successful response with event details.
  /?Action=AddTagsToResource:
    post:
      operationId: addTagsToResource
      summary: Add tags to a Neptune resource
      description: >-
        Adds metadata tags to an Amazon Neptune resource. Tags are key-value
        pairs that you can use to categorize and manage your resources.
      tags:
        - Tags
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - AddTagsToResource
        - name: ResourceName
          in: query
          required: true
          description: The ARN of the resource to add tags to.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Tags added successfully.
        '404':
          description: The specified resource was not found.
  /?Action=ListTagsForResource:
    get:
      operationId: listTagsForResource
      summary: List tags for a Neptune resource
      description: >-
        Lists all tags on an Amazon Neptune resource.
      tags:
        - Tags
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - ListTagsForResource
        - name: ResourceName
