openapi: 3.1.0
info:
  title: Amazon Neptune Management API
  description: >-
    Amazon Neptune Management API for creating, managing, and deleting Neptune
    DB clusters, instances, parameter groups, snapshots, and related
    infrastructure resources. This is an AWS Query API that uses HTTPS requests
    with Action and parameter query strings.
  version: '2014-10-31'
  contact:
    name: Amazon Web Services
    url: https://aws.amazon.com/neptune/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: https://rds.{region}.amazonaws.com
    description: Amazon Neptune Management API regional endpoint
    variables:
      region:
        default: us-east-1
        description: AWS region
        enum:
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
          - eu-west-1
          - eu-west-2
          - eu-west-3
          - eu-central-1
          - eu-north-1
          - ap-southeast-1
          - ap-southeast-2
          - ap-northeast-1
          - ap-northeast-2
          - ap-south-1
          - ca-central-1
          - me-south-1
          - sa-east-1
security:
  - aws_sigv4: []
tags:
  - name: DB Clusters
    description: Operations for managing Neptune DB clusters
  - name: Global Clusters
    description: Operations for managing Neptune global database clusters
  - name: DB Instances
    description: Operations for managing Neptune DB instances
  - name: Parameter Groups
    description: Operations for managing DB and cluster parameter groups
  - name: Subnet Groups
    description: Operations for managing DB subnet groups
  - name: Snapshots
    description: Operations for managing cluster snapshots
  - name: Events
    description: Operations for managing event subscriptions and viewing events
  - name: Tags
    description: Operations for tagging Neptune resources
  - name: Maintenance
    description: Operations for managing pending maintenance actions
  - name: Engine
    description: Operations for querying engine version information
paths:
  /:
    get:
      operationId: describeDBClusters
      summary: Describe Neptune DB clusters
      description: >-
        Returns information about provisioned Neptune DB clusters. If a cluster
        identifier is supplied, details for that specific cluster are returned.
        Otherwise, details for up to 100 clusters are returned.
      tags:
        - DB Clusters
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - DescribeDBClusters
        - name: DBClusterIdentifier
          in: query
          description: The identifier of the DB cluster to describe.
          schema:
            type: string
        - name: MaxRecords
          in: query
          description: Maximum number of records to include in the response (20-100).
          schema:
            type: integer
            minimum: 20
            maximum: 100
        - name: Marker
          in: query
          description: Pagination token from a previous request.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Successful response with DB cluster details.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DescribeDBClustersResponse'
        '404':
          description: The specified DB cluster was not found.
    post:
      operationId: createDBCluster
      summary: Create a new Neptune DB cluster
      description: >-
        Creates a new Amazon Neptune DB cluster. You can use the
        ReplicationSourceIdentifier parameter to create the DB cluster as a
        read replica of another DB cluster.
      tags:
        - DB Clusters
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - CreateDBCluster
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateDBClusterRequest'
      responses:
        '200':
          description: DB cluster created successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBCluster'
        '400':
          description: Invalid request parameters.
        '409':
          description: A DB cluster with the specified identifier already exists.
  /?Action=DeleteDBCluster:
    post:
      operationId: deleteDBCluster
      summary: Delete a Neptune DB cluster
      description: >-
        Deletes a previously provisioned DB cluster. When you delete a DB
        cluster, all automated backups are deleted and cannot be recovered.
        Manual snapshots are not deleted.
      tags:
        - DB Clusters
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - DeleteDBCluster
        - name: DBClusterIdentifier
          in: query
          required: true
          description: The DB cluster identifier for the cluster to be deleted.
          schema:
            type: string
        - name: SkipFinalSnapshot
          in: query
          description: Whether to skip creation of a final snapshot before deletion.
          schema:
            type: boolean
        - name: FinalDBSnapshotIdentifier
          in: query
          description: The identifier of the final snapshot to create before deletion.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: DB cluster deleted successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBCluster'
        '404':
          description: The specified DB cluster was not found.
  /?Action=ModifyDBCluster:
    post:
      operationId: modifyDBCluster
      summary: Modify a Neptune DB cluster
      description: >-
        Modifies settings for a DB cluster. You can change one or more database
        configuration parameters by specifying them and their new values.
      tags:
        - DB Clusters
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - ModifyDBCluster
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ModifyDBClusterRequest'
      responses:
        '200':
          description: DB cluster modified successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBCluster'
        '404':
          description: The specified DB cluster was not found.
  /?Action=StartDBCluster:
    post:
      operationId: startDBCluster
      summary: Start a stopped Neptune DB cluster
      description: >-
        Starts a stopped Neptune DB cluster. When you start a cluster, Neptune
        restores the cluster to the state it was in when it was stopped.
      tags:
        - DB Clusters
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - StartDBCluster
        - name: DBClusterIdentifier
          in: query
          required: true
          description: The identifier of the DB cluster to start.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: DB cluster start initiated successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBCluster'
        '404':
          description: The specified DB cluster was not found.
  /?Action=StopDBCluster:
    post:
      operationId: stopDBCluster
      summary: Stop a running Neptune DB cluster
      description: >-
        Stops a running Neptune DB cluster. While the cluster is stopped, you
        are charged only for storage. A stopped cluster automatically restarts
        after 7 days.
      tags:
        - DB Clusters
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - StopDBCluster
        - name: DBClusterIdentifier
          in: query
          required: true
          description: The identifier of the DB cluster to stop.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: DB cluster stop initiated successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBCluster'
        '404':
          description: The specified DB cluster was not found.
  /?Action=FailoverDBCluster:
    post:
      operationId: failoverDBCluster
      summary: Force a failover for a Neptune DB cluster
      description: >-
        Forces a failover for a DB cluster. A failover for a DB cluster promotes
        one of the read replicas in the cluster to be the new primary instance.
      tags:
        - DB Clusters
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - FailoverDBCluster
        - name: DBClusterIdentifier
          in: query
          required: true
          description: The identifier of the cluster to force a failover for.
          schema:
            type: string
        - name: TargetDBInstanceIdentifier
          in: query
          description: The name of the instance to promote to the primary instance.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Failover initiated successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBCluster'
        '404':
          description: The specified DB cluster was not found.
  /?Action=AddRoleToDBCluster:
    post:
      operationId: addRoleToDBCluster
      summary: Associate an IAM role with a Neptune DB cluster
      description: >-
        Associates an Identity and Access Management (IAM) role with a Neptune
        DB cluster so that the cluster can access other AWS services on your
        behalf.
      tags:
        - DB Clusters
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - AddRoleToDBCluster
        - name: DBClusterIdentifier
          in: query
          required: true
          description: The name of the DB cluster to associate the IAM role with.
          schema:
            type: string
        - name: RoleArn
          in: query
          required: true
          description: The ARN of the IAM role to associate with the cluster.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: IAM role associated successfully.
        '404':
          description: The specified DB cluster was not found.
  /?Action=RemoveRoleFromDBCluster:
    post:
      operationId: removeRoleFromDBCluster
      summary: Disassociate an IAM role from a Neptune DB cluster
      description: >-
        Disassociates an Identity and Access Management (IAM) role from a
        Neptune DB cluster.
      tags:
        - DB Clusters
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - RemoveRoleFromDBCluster
        - name: DBClusterIdentifier
          in: query
          required: true
          description: The name of the DB cluster to disassociate the role from.
          schema:
            type: string
        - name: RoleArn
          in: query
          required: true
          description: The ARN of the IAM role to disassociate.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: IAM role disassociated successfully.
        '404':
          description: The specified DB cluster or role was not found.
  /?Action=CreateDBInstance:
    post:
      operationId: createDBInstance
      summary: Create a new Neptune DB instance
      description: >-
        Creates a new DB instance in a Neptune DB cluster. The DB instance
        inherits the cluster's storage and high availability configuration.
      tags:
        - DB Instances
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - CreateDBInstance
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateDBInstanceRequest'
      responses:
        '200':
          description: DB instance created successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBInstance'
        '400':
          description: Invalid request parameters.
        '409':
          description: A DB instance with the specified identifier already exists.
  /?Action=DeleteDBInstance:
    post:
      operationId: deleteDBInstance
      summary: Delete a Neptune DB instance
      description: >-
        Deletes a previously provisioned DB instance. When you delete an
        instance, all automated backups for that instance are deleted and
        cannot be recovered.
      tags:
        - DB Instances
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - DeleteDBInstance
        - name: DBInstanceIdentifier
          in: query
          required: true
          description: The DB instance identifier for the instance to be deleted.
          schema:
            type: string
        - name: SkipFinalSnapshot
          in: query
          description: Whether to skip creation of a final snapshot.
          schema:
            type: boolean
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: DB instance deleted successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBInstance'
        '404':
          description: The specified DB instance was not found.
  /?Action=DescribeDBInstances:
    get:
      operationId: describeDBInstances
      summary: Describe Neptune DB instances
      description: >-
        Returns information about provisioned Neptune DB instances. If a
        specific instance identifier is supplied, details for that instance
        are returned.
      tags:
        - DB Instances
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - DescribeDBInstances
        - name: DBInstanceIdentifier
          in: query
          description: The identifier of the DB instance to describe.
          schema:
            type: string
        - name: MaxRecords
          in: query
          description: Maximum number of records to include in the response.
          schema:
            type: integer
            minimum: 20
            maximum: 100
        - name: Marker
          in: query
          description: Pagination token from a previous request.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Successful response with DB instance details.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DescribeDBInstancesResponse'
        '404':
          description: The specified DB instance was not found.
  /?Action=ModifyDBInstance:
    post:
      operationId: modifyDBInstance
      summary: Modify a Neptune DB instance
      description: >-
        Modifies settings for a DB instance. You can change one or more database
        configuration parameters by specifying them and their new values.
      tags:
        - DB Instances
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - ModifyDBInstance
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ModifyDBInstanceRequest'
      responses:
        '200':
          description: DB instance modified successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBInstance'
        '404':
          description: The specified DB instance was not found.
  /?Action=RebootDBInstance:
    post:
      operationId: rebootDBInstance
      summary: Reboot a Neptune DB instance
      description: >-
        Reboots a DB instance. When you reboot an instance, the instance is
        restarted. Rebooting results in a momentary outage.
      tags:
        - DB Instances
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - RebootDBInstance
        - name: DBInstanceIdentifier
          in: query
          required: true
          description: The identifier of the DB instance to reboot.
          schema:
            type: string
        - name: ForceFailover
          in: query
          description: Whether to force a failover during the reboot.
          schema:
            type: boolean
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: DB instance reboot initiated successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBInstance'
        '404':
          description: The specified DB instance was not found.
  /?Action=CreateDBClusterSnapshot:
    post:
      operationId: createDBClusterSnapshot
      summary: Create a snapshot of a Neptune DB cluster
      description: >-
        Creates a snapshot of a DB cluster. Manual snapshots can be used to
        restore a DB cluster to a specific state.
      tags:
        - Snapshots
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - CreateDBClusterSnapshot
        - name: DBClusterIdentifier
          in: query
          required: true
          description: The identifier of the DB cluster to create a snapshot for.
          schema:
            type: string
        - name: DBClusterSnapshotIdentifier
          in: query
          required: true
          description: The identifier for the DB cluster snapshot.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: DB cluster snapshot created successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBClusterSnapshot'
        '404':
          description: The specified DB cluster was not found.
  /?Action=DescribeDBClusterSnapshots:
    get:
      operationId: describeDBClusterSnapshots
      summary: Describe Neptune DB cluster snapshots
      description: >-
        Returns information about DB cluster snapshots. If a specific snapshot
        identifier is supplied, details for that snapshot are returned.
      tags:
        - Snapshots
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - DescribeDBClusterSnapshots
        - name: DBClusterSnapshotIdentifier
          in: query
          description: The identifier of a specific snapshot to describe.
          schema:
            type: string
        - name: DBClusterIdentifier
          in: query
          description: The identifier of the cluster to filter snapshots by.
          schema:
            type: string
        - name: MaxRecords
          in: query
          description: Maximum number of records to include in the response.
          schema:
            type: integer
        - name: Marker
          in: query
          description: Pagination token from a previous request.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Successful response with snapshot details.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DescribeDBClusterSnapshotsResponse'
  /?Action=DeleteDBClusterSnapshot:
    post:
      operationId: deleteDBClusterSnapshot
      summary: Delete a Neptune DB cluster snapshot
      description: >-
        Deletes a DB cluster snapshot. If the snapshot is being copied, the
        copy operation is terminated.
      tags:
        - Snapshots
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - DeleteDBClusterSnapshot
        - name: DBClusterSnapshotIdentifier
          in: query
          required: true
          description: The identifier of the cluster snapshot to delete.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: DB cluster snapshot deleted successfully.
        '404':
          description: The specified snapshot was not found.
  /?Action=RestoreDBClusterFromSnapshot:
    post:
      operationId: restoreDBClusterFromSnapshot
      summary: Restore a Neptune DB cluster from a snapshot
      description: >-
        Creates a new DB cluster from a DB snapshot or DB cluster snapshot.
        The new DB cluster is created from the source snapshot with a default
        configuration.
      tags:
        - Snapshots
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - RestoreDBClusterFromSnapshot
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RestoreDBClusterFromSnapshotRequest'
      responses:
        '200':
          description: DB cluster restore initiated successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBCluster'
        '404':
          description: The specified snapshot was not found.
  /?Action=CreateDBSubnetGroup:
    post:
      operationId: createDBSubnetGroup
      summary: Create a new DB subnet group
      description: >-
        Creates a new DB subnet group. DB subnet groups must contain at least
        one subnet in at least two Availability Zones in the AWS Region.
      tags:
        - Subnet Groups
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - CreateDBSubnetGroup
        - name: DBSubnetGroupName
          in: query
          required: true
          description: The name for the DB subnet group.
          schema:
            type: string
        - name: DBSubnetGroupDescription
          in: query
          required: true
          description: The description for the DB subnet group.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: DB subnet group created successfully.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DBSubnetGroup'
        '400':
          description: Invalid request parameters.
  /?Action=DescribeDBSubnetGroups:
    get:
      operationId: describeDBSubnetGroups
      summary: Describe DB subnet groups
      description: >-
        Returns a list of DB subnet group descriptions. If a specific subnet
        group name is supplied, the description for that group is returned.
      tags:
        - Subnet Groups
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - DescribeDBSubnetGroups
        - name: DBSubnetGroupName
          in: query
          description: The name of a specific DB subnet group to describe.
          schema:
            type: string
        - name: MaxRecords
          in: query
          schema:
            type: integer
        - name: Marker
          in: query
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: Successful response with subnet group details.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DescribeDBSubnetGroupsResponse'
  /?Action=CreateDBParameterGroup:
    post:
      operationId: createDBParameterGroup
      summary: Create a new DB parameter group
      description: >-
        Creates a new DB parameter group. A DB parameter group is initially
        created with the default parameters for the database engine used.
      tags:
        - Parameter Groups
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - CreateDBParameterGroup
        - name: DBParameterGroupName
          in: query
          required: true
          description: The name of the DB parameter group.
          schema:
            type: string
        - name: DBParameterGroupFamily
          in: query
          required: true
          description: The DB parameter group family name (e.g., neptune1, neptune1.2, neptune1.3).
          schema:
            type: string
        - name: Description
          in: query
          required: true
          description: The description for the DB parameter group.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: DB parameter group created successfully.
        '400':
          description: Invalid request parameters.
  /?Action=CreateDBClusterParameterGroup:
    post:
      operationId: createDBClusterParameterGroup
      summary: Create a new DB cluster parameter group
      description: >-
        Creates a new DB cluster parameter group. Parameters in a DB cluster
        parameter group apply to all of the instances in a DB cluster.
      tags:
        - Parameter Groups
      parameters:
        - name: Action
          in: query
          required: true
          schema:
            type: string
            enum:
              - CreateDBClusterParameterGroup
        - name: DBClusterParameterGroupName
          in: query
          required: true
          description: The name of the DB cluster parameter group.
          schema:
            type: string
        - name: DBParameterGroupFamily
          in: query
          required: true
          description: The DB parameter group family name.
          schema:
            type: string
        - name: Description
          in: query
          required: true
          description: The description for the DB cluster parameter group.
          schema:
            type: string
        - name: Version
          in: query
          required: true
          schema:
            type: string
            default: '2014-10-31'
      responses:
        '200':
          description: DB cluster parameter group created successfully.
        '400':
          description: Invalid request parameters.
  /?Action=DescribeDBParameterGroups:
