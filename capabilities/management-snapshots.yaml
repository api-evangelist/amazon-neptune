naftiko: 1.0.0-alpha2
info:
  label: Amazon Neptune Management API — Snapshots
  description: 'Amazon Neptune Management API — Snapshots. 4 operations. Lead operation: Amazon Neptune Create a Snapshot
    of a Neptune DB Cluster. Self-contained Naftiko capability covering one Amazon Neptune business surface.'
  tags:
  - Amazon Neptune
  - Snapshots
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_NEPTUNE_API_KEY: AMAZON_NEPTUNE_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-snapshots
    baseUri: https://rds.{region}.amazonaws.com
    description: Amazon Neptune Management API — Snapshots business capability. Self-contained, no shared references.
    resources:
    - name: ?Action=CreateDBClusterSnapshot
      path: /?Action=CreateDBClusterSnapshot
      operations:
      - name: createdbclustersnapshot
        method: POST
        description: Amazon Neptune Create a Snapshot of a Neptune DB Cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
        - name: DBClusterIdentifier
          in: query
          type: string
          description: The identifier of the DB cluster to create a snapshot for.
          required: true
        - name: DBClusterSnapshotIdentifier
          in: query
          type: string
          description: The identifier for the DB cluster snapshot.
          required: true
        - name: Version
          in: query
          type: string
          required: true
    - name: ?Action=DeleteDBClusterSnapshot
      path: /?Action=DeleteDBClusterSnapshot
      operations:
      - name: deletedbclustersnapshot
        method: POST
        description: Amazon Neptune Delete a Neptune DB Cluster Snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
        - name: DBClusterSnapshotIdentifier
          in: query
          type: string
          description: The identifier of the cluster snapshot to delete.
          required: true
        - name: Version
          in: query
          type: string
          required: true
    - name: ?Action=DescribeDBClusterSnapshots
      path: /?Action=DescribeDBClusterSnapshots
      operations:
      - name: describedbclustersnapshots
        method: GET
        description: Amazon Neptune Describe Neptune DB Cluster Snapshots
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
        - name: DBClusterSnapshotIdentifier
          in: query
          type: string
          description: The identifier of a specific snapshot to describe.
        - name: DBClusterIdentifier
          in: query
          type: string
          description: The identifier of the cluster to filter snapshots by.
        - name: MaxRecords
          in: query
          type: integer
          description: Maximum number of records to include in the response.
        - name: Marker
          in: query
          type: string
          description: Pagination token from a previous request.
        - name: Version
          in: query
          type: string
          required: true
    - name: ?Action=RestoreDBClusterFromSnapshot
      path: /?Action=RestoreDBClusterFromSnapshot
      operations:
      - name: restoredbclusterfromsnapshot
        method: POST
        description: Amazon Neptune Restore a Neptune DB Cluster from a Snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
        - name: Version
          in: query
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_NEPTUNE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: management-snapshots-rest
    port: 8080
    description: REST adapter for Amazon Neptune Management API — Snapshots. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/action-createdbclustersnapshot
      name: action-createdbclustersnapshot
      description: REST surface for ?Action=CreateDBClusterSnapshot.
      operations:
      - method: POST
        name: createdbclustersnapshot
        description: Amazon Neptune Create a Snapshot of a Neptune DB Cluster
        call: management-snapshots.createdbclustersnapshot
        with:
          Action: rest.Action
          DBClusterIdentifier: rest.DBClusterIdentifier
          DBClusterSnapshotIdentifier: rest.DBClusterSnapshotIdentifier
          Version: rest.Version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/action-deletedbclustersnapshot
      name: action-deletedbclustersnapshot
      description: REST surface for ?Action=DeleteDBClusterSnapshot.
      operations:
      - method: POST
        name: deletedbclustersnapshot
        description: Amazon Neptune Delete a Neptune DB Cluster Snapshot
        call: management-snapshots.deletedbclustersnapshot
        with:
          Action: rest.Action
          DBClusterSnapshotIdentifier: rest.DBClusterSnapshotIdentifier
          Version: rest.Version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/action-describedbclustersnapshots
      name: action-describedbclustersnapshots
      description: REST surface for ?Action=DescribeDBClusterSnapshots.
      operations:
      - method: GET
        name: describedbclustersnapshots
        description: Amazon Neptune Describe Neptune DB Cluster Snapshots
        call: management-snapshots.describedbclustersnapshots
        with:
          Action: rest.Action
          DBClusterSnapshotIdentifier: rest.DBClusterSnapshotIdentifier
          DBClusterIdentifier: rest.DBClusterIdentifier
          MaxRecords: rest.MaxRecords
          Marker: rest.Marker
          Version: rest.Version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/action-restoredbclusterfromsnapshot
      name: action-restoredbclusterfromsnapshot
      description: REST surface for ?Action=RestoreDBClusterFromSnapshot.
      operations:
      - method: POST
        name: restoredbclusterfromsnapshot
        description: Amazon Neptune Restore a Neptune DB Cluster from a Snapshot
        call: management-snapshots.restoredbclusterfromsnapshot
        with:
          Action: rest.Action
          Version: rest.Version
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-snapshots-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Neptune Management API — Snapshots. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-neptune-create-snapshot-neptune
      description: Amazon Neptune Create a Snapshot of a Neptune DB Cluster
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-snapshots.createdbclustersnapshot
      with:
        Action: tools.Action
        DBClusterIdentifier: tools.DBClusterIdentifier
        DBClusterSnapshotIdentifier: tools.DBClusterSnapshotIdentifier
        Version: tools.Version
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-neptune-delete-neptune-db
      description: Amazon Neptune Delete a Neptune DB Cluster Snapshot
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-snapshots.deletedbclustersnapshot
      with:
        Action: tools.Action
        DBClusterSnapshotIdentifier: tools.DBClusterSnapshotIdentifier
        Version: tools.Version
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-neptune-describe-neptune-db
      description: Amazon Neptune Describe Neptune DB Cluster Snapshots
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-snapshots.describedbclustersnapshots
      with:
        Action: tools.Action
        DBClusterSnapshotIdentifier: tools.DBClusterSnapshotIdentifier
        DBClusterIdentifier: tools.DBClusterIdentifier
        MaxRecords: tools.MaxRecords
        Marker: tools.Marker
        Version: tools.Version
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-neptune-restore-neptune-db
      description: Amazon Neptune Restore a Neptune DB Cluster from a Snapshot
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-snapshots.restoredbclusterfromsnapshot
      with:
        Action: tools.Action
        Version: tools.Version
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
