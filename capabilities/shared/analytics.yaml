naftiko: 1.0.0-alpha1
info:
  label: Amazon Neptune Neptune Analytics API
  description: Neptune Analytics is a memory-optimized graph database engine for analytics, providing optimized graph analytic algorithms, low-latency queries, and vector search capabilities within 
    graph traversals.
  tags:
  - Amazon Neptune
  - AWS
  - Graph Database
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_SIGV4_AUTH: AWS_SIGV4_AUTH
capability:
  consumes:
  - type: http
    namespace: analytics
    baseUri: https://neptune-graph.{region}.amazonaws.com
    description: Neptune Analytics is a memory-optimized graph database engine for analytics, providing optimized gra
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_AUTH}}'
      placement: header
    resources:
    - name: graphs
      path: /graphs
      description: Graphs operations for Amazon Neptune Neptune Analytics API
      operations:
      - name: listGraphs
        method: GET
        description: Amazon Neptune List Neptune Analytics Graphs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxResults
          in: query
          type: integer
          required: false
          description: Maximum number of results to return.
        - name: nextToken
          in: query
          type: string
          required: false
          description: Pagination token from a previous request.
      - name: createGraph
        method: POST
        description: Amazon Neptune Create a Neptune Analytics Graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getGraph
        method: GET
        description: Amazon Neptune Get Neptune Analytics Graph Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the graph.
      - name: updateGraph
        method: PATCH
        description: Amazon Neptune Update a Neptune Analytics Graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the graph.
        body:
          type: json
          data: {}
      - name: deleteGraph
        method: DELETE
        description: Amazon Neptune Delete a Neptune Analytics Graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the graph to delete.
        - name: skipSnapshot
          in: query
          type: boolean
          required: true
          description: Whether to skip creating a final snapshot before deletion.
      - name: resetGraph
        method: PUT
        description: Amazon Neptune Reset a Neptune Analytics Graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the graph to reset.
        body:
          type: json
          data: {}
    - name: graph-snapshots
      path: /graph-snapshots
      description: Graph Snapshots operations for Amazon Neptune Neptune Analytics API
      operations:
      - name: listGraphSnapshots
        method: GET
        description: Amazon Neptune List Graph Snapshots
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: query
          type: string
          required: false
          description: Filter snapshots by source graph identifier.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: maxResults
        - name: nextToken
          in: query
          type: string
          required: false
          description: nextToken
      - name: createGraphSnapshot
        method: POST
        description: Amazon Neptune Create a Graph Snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getGraphSnapshot
        method: GET
        description: Amazon Neptune Get Graph Snapshot Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: snapshotIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the snapshot.
      - name: deleteGraphSnapshot
        method: DELETE
        description: Amazon Neptune Delete a Graph Snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: snapshotIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the snapshot to delete.
      - name: restoreGraphFromSnapshot
        method: POST
        description: Amazon Neptune Restore a Graph from a Snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: snapshotIdentifier
          in: path
          type: string
          required: true
          description: The identifier of the snapshot to restore from.
        body:
          type: json
          data: {}
    - name: import-tasks
      path: /import-tasks
      description: Import Tasks operations for Amazon Neptune Neptune Analytics API
      operations:
      - name: listImportTasks
        method: GET
        description: Amazon Neptune List Import Tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxResults
          in: query
          type: integer
          required: false
          description: maxResults
        - name: nextToken
          in: query
          type: string
          required: false
          description: nextToken
      - name: createGraphUsingImportTask
        method: POST
        description: Amazon Neptune Create a Graph Using an Import Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getImportTask
        method: GET
        description: Amazon Neptune Get Import Task Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the import task.
      - name: cancelImportTask
        method: DELETE
        description: Amazon Neptune Cancel an Import Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the import task to cancel.
    - name: private-graph-endpoints
      path: /private-graph-endpoints
      description: Private Graph Endpoints operations for Amazon Neptune Neptune Analytics API
      operations:
      - name: listPrivateGraphEndpoints
        method: GET
        description: Amazon Neptune List Private Graph Endpoints
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: graphIdentifier
        - name: maxResults
          in: query
          type: integer
          required: false
          description: maxResults
        - name: nextToken
          in: query
          type: string
          required: false
          description: nextToken
      - name: createPrivateGraphEndpoint
        method: POST
        description: Amazon Neptune Create a Private Graph Endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the graph.
        body:
          type: json
          data: {}
      - name: getPrivateGraphEndpoint
        method: GET
        description: Amazon Neptune Get Private Graph Endpoint Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: graphIdentifier
        - name: vpcId
          in: path
          type: string
          required: true
          description: The VPC ID of the private endpoint.
      - name: deletePrivateGraphEndpoint
        method: DELETE
        description: Amazon Neptune Delete a Private Graph Endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: graphIdentifier
        - name: vpcId
          in: path
          type: string
          required: true
          description: vpcId
