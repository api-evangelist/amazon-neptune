naftiko: 1.0.0-alpha1
info:
  label: Amazon Neptune Neptune openCypher API
  description: openCypher graph query language API for querying property graphs with Cypher syntax in Neptune. It provides an HTTP endpoint for executing openCypher queries against property graph 
    data. Neptune suppo
  tags:
  - Amazon Neptune
  - AWS
  - Graph Database
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_SIGV4_AUTH: AWS_SIGV4_AUTH
capability:
  consumes:
  - type: http
    namespace: opencypher
    baseUri: https://{cluster-endpoint}:8182
    description: openCypher graph query language API for querying property graphs with Cypher syntax in Neptune. It p
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_AUTH}}'
      placement: header
    resources:
    - name: query
      path: /query
      description: Query operations for Amazon Neptune Neptune openCypher API
      operations:
      - name: executeOpenCypherQueryGet
        method: GET
        description: Amazon Neptune Execute an OpenCypher Query via HTTP GET
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
          description: The openCypher query string (URL-encoded).
        - name: TE
          in: header
          type: string
          required: false
          description: Set to 'trailers' for trailing headers.
      - name: executeOpenCypherQuery
        method: POST
        description: Amazon Neptune Execute an OpenCypher Query via HTTP POST
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: TE
          in: header
          type: string
          required: false
          description: Set to 'trailers' to enable trailing headers for better error detection. Available in Neptune 1.4.5.
        body:
          type: json
          data: {}
    - name: status
      path: /status
      description: Status operations for Amazon Neptune Neptune openCypher API
      operations:
      - name: getOpenCypherQueryStatus
        method: GET
        description: Amazon Neptune Get the Status of All Running OpenCypher Queries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getOpenCypherQueryStatusById
        method: GET
        description: Amazon Neptune Get the Status of a Specific OpenCypher Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queryId
          in: path
          type: string
          required: true
          description: The unique identifier of the openCypher query.
      - name: cancelOpenCypherQuery
        method: DELETE
        description: Amazon Neptune Cancel a Running OpenCypher Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queryId
          in: path
          type: string
          required: true
          description: The unique identifier of the openCypher query to cancel.
