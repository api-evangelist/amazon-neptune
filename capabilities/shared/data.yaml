        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: neptuneIamRoleArn
      - name: startMLModelTransformJob
        method: POST
        description: Amazon Neptune Start an ML Model Transform Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getMLModelTransformJobStatus
        method: GET
        description: Amazon Neptune Get ML Model Transform Job Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
