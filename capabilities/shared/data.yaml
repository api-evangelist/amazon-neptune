naftiko: 1.0.0-alpha1
info:
  label: Amazon Neptune Data API
  description: Amazon Neptune Data API provides SDK support for more than 40 data operations including data loading, query execution, data inquiry, and machine learning. It supports Gremlin and 
    openCypher query lang
  tags:
  - Amazon Neptune
  - AWS
  - Graph Database
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_SIGV4_AUTH: AWS_SIGV4_AUTH
capability:
  consumes:
  - type: http
    namespace: data
    baseUri: https://neptune-db.{region}.amazonaws.com
    description: Amazon Neptune Data API provides SDK support for more than 40 data operations including data loading
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_AUTH}}'
      placement: header
    resources:
    - name: gremlin
      path: /gremlin
      description: Gremlin operations for Amazon Neptune Data API
      operations:
      - name: executeGremlinQuery
        method: POST
        description: Amazon Neptune Execute a Gremlin Query via the Data API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: executeGremlinExplainQuery
        method: POST
        description: Amazon Neptune Get the Execution Plan for a Gremlin Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: executeGremlinProfileQuery
        method: POST
        description: Amazon Neptune Profile a Gremlin Query Execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getGremlinQueryStatus
        method: GET
        description: Amazon Neptune Get the Status of Gremlin Queries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getGremlinQueryStatusById
        method: GET
        description: Amazon Neptune Get the Status of a Specific Gremlin Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queryId
          in: path
          type: string
          required: true
          description: The unique identifier of the Gremlin query.
      - name: cancelGremlinQuery
        method: DELETE
        description: Amazon Neptune Cancel a Running Gremlin Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queryId
          in: path
          type: string
          required: true
          description: The unique identifier of the Gremlin query to cancel.
    - name: opencypher
      path: /opencypher
      description: openCypher operations for Amazon Neptune Data API
      operations:
      - name: executeOpenCypherQuery
        method: POST
        description: Amazon Neptune Execute an OpenCypher Query via the Data API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: executeOpenCypherExplainQuery
        method: POST
        description: Amazon Neptune Get the Execution Plan for an OpenCypher Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getOpenCypherQueryStatus
        method: GET
        description: Amazon Neptune Get the Status of OpenCypher Queries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getOpenCypherQueryStatusById
        method: GET
        description: Amazon Neptune Get the Status of a Specific OpenCypher Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queryId
          in: path
          type: string
          required: true
          description: The unique identifier of the openCypher query.
      - name: cancelOpenCypherQuery
        method: DELETE
        description: Amazon Neptune Cancel a Running OpenCypher Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queryId
          in: path
          type: string
          required: true
          description: The unique identifier of the openCypher query to cancel.
    - name: sparql
      path: /sparql
      description: SPARQL operations for Amazon Neptune Data API
      operations:
      - name: executeSparqlQuery
        method: POST
        description: Amazon Neptune Execute a SPARQL Query via the Data API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getSparqlQueryStatus
        method: GET
        description: Amazon Neptune Get the Status of SPARQL Queries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: status
      path: /status
      description: Status operations for Amazon Neptune Data API
      operations:
      - name: getEngineStatus
        method: GET
        description: Amazon Neptune Get Neptune Engine Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getPropertygraphStatistics
        method: GET
        description: Amazon Neptune Get Property Graph Statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: managePropertygraphStatistics
        method: POST
        description: Amazon Neptune Manage Property Graph Statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getSparqlStatistics
        method: GET
        description: Amazon Neptune Get SPARQL RDF Statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: manageSparqlStatistics
        method: POST
        description: Amazon Neptune Manage SPARQL RDF Statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
    - name: loader
      path: /loader
      description: Loader operations for Amazon Neptune Data API
      operations:
      - name: listLoaderJobs
        method: GET
        description: Amazon Neptune List Bulk Loader Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of load IDs to return.
        - name: includeQueuedLoads
          in: query
          type: boolean
          required: false
          description: Whether to include queued loads in the response.
      - name: startLoaderJob
        method: POST
        description: Amazon Neptune Start a Bulk Loader Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getLoaderJobStatus
        method: GET
        description: Amazon Neptune Get the Status of a Bulk Loader Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: loadId
          in: path
          type: string
          required: true
          description: The unique identifier of the load job.
        - name: details
          in: query
          type: boolean
          required: false
          description: Whether to include detailed status information.
        - name: errors
          in: query
          type: boolean
          required: false
          description: Whether to include error details.
        - name: page
          in: query
          type: integer
          required: false
          description: Error page number to retrieve.
        - name: errorsPerPage
          in: query
          type: integer
          required: false
          description: Number of errors per page.
      - name: cancelLoaderJob
        method: DELETE
        description: Amazon Neptune Cancel a Bulk Loader Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: loadId
          in: path
          type: string
          required: true
          description: The unique identifier of the load job to cancel.
    - name: streams
      path: /streams
      description: Streams operations for Amazon Neptune Data API
      operations:
      - name: getPropertygraphStream
        method: GET
        description: Amazon Neptune Get Property Graph Change Stream Records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of records to return (1-100000, default 10).
        - name: iteratorType
          in: query
          type: string
          required: false
          description: The stream position to start reading from.
        - name: commitNum
          in: query
          type: integer
          required: false
          description: The commit number to start from.
        - name: opNum
          in: query
          type: integer
          required: false
          description: The operation sequence number within the commit.
      - name: getSparqlStream
        method: GET
        description: Amazon Neptune Get SPARQL RDF Change Stream Records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of records to return (1-100000, default 10).
        - name: iteratorType
          in: query
          type: string
          required: false
          description: The stream position to start reading from.
        - name: commitNum
          in: query
          type: integer
          required: false
          description: The commit number to start from.
        - name: opNum
          in: query
          type: integer
          required: false
          description: The operation sequence number within the commit.
    - name: ml
      path: /ml
      description: ML operations for Amazon Neptune Data API
      operations:
      - name: listMLDataProcessingJobs
        method: GET
        description: Amazon Neptune List ML Data Processing Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxItems
          in: query
          type: integer
          required: false
          description: Maximum number of items to return (default 10, max 1024).
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: The ARN of the IAM role for Neptune access.
      - name: startMLDataProcessingJob
        method: POST
        description: Amazon Neptune Start an ML Data Processing Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getMLDataProcessingJobStatus
        method: GET
        description: Amazon Neptune Get ML Data Processing Job Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
          description: The unique identifier of the data processing job.
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: The ARN of the IAM role for Neptune access.
      - name: cancelMLDataProcessingJob
        method: DELETE
        description: Amazon Neptune Cancel an ML Data Processing Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
          description: The unique identifier of the data processing job.
        - name: clean
          in: query
          type: boolean
          required: false
          description: Whether to delete all S3 artifacts when cancelling.
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: The ARN of the IAM role for Neptune access.
      - name: listMLModelTrainingJobs
        method: GET
        description: Amazon Neptune List ML Model Training Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxItems
          in: query
          type: integer
          required: false
          description: maxItems
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: neptuneIamRoleArn
      - name: startMLModelTrainingJob
        method: POST
        description: Amazon Neptune Start an ML Model Training Job
        outputRawFormat: json
