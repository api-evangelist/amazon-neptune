naftiko: 1.0.0-alpha1
info:
  label: Amazon Neptune Neptune ML API
  description: Neptune ML enables machine learning on graph data using graph neural networks. It provides APIs for data processing, model training, model transform, and inference endpoint management 
    powered by Amazo
  tags:
  - Amazon Neptune
  - AWS
  - Graph Database
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_SIGV4_AUTH: AWS_SIGV4_AUTH
capability:
  consumes:
  - type: http
    namespace: ml
    baseUri: https://{cluster-endpoint}:8182
    description: 'Neptune ML enables machine learning on graph data using graph neural networks. It provides APIs for '
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_AUTH}}'
      placement: header
    resources:
    - name: data-processing
      path: /data-processing
      description: Data Processing operations for Amazon Neptune Neptune ML API
      operations:
      - name: listDataProcessingJobs
        method: GET
        description: Amazon Neptune List Active Data Processing Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxItems
          in: query
          type: integer
          required: false
          description: Maximum number of items to return (default 10, max 1024).
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: The ARN of the IAM role for Neptune access.
      - name: createDataProcessingJob
        method: POST
        description: Amazon Neptune Create an ML Data Processing Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getDataProcessingJobStatus
        method: GET
        description: Amazon Neptune Get Data Processing Job Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The unique identifier of the data processing job.
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: The ARN of the IAM role for Neptune access.
      - name: stopDataProcessingJob
        method: DELETE
        description: Amazon Neptune Stop a Data Processing Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The unique identifier of the data processing job.
        - name: clean
          in: query
          type: boolean
          required: false
          description: Whether to delete all S3 artifacts when stopping.
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: The ARN of the IAM role for Neptune access.
    - name: model-training
      path: /model-training
      description: Model Training operations for Amazon Neptune Neptune ML API
