    description: Unified REST API for Neptune graph database management.
    resources:
    - path: /v1/clusters
      name: clusters
      description: Neptune DB cluster management
      operations:
      - method: GET
        name: list-clusters
        description: List all Neptune DB clusters
        call: management.describeDBClusters
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/queries
      name: queries
      description: Execute graph queries
      operations:
      - method: POST
        name: execute-gremlin-query
        description: Execute a Gremlin graph traversal query
        call: data.executeGremlinQuery
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: execute-sparql-query
        description: Execute a SPARQL query against RDF graph
        call: data.executeSparqlQuery
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: execute-opencypher-query
        description: Execute an openCypher query
        call: data.executeOpenCypherQuery
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/loader
      name: loader
      description: Bulk data loading operations
      operations:
      - method: POST
        name: start-load-job
        description: Start a bulk data load from S3
        call: loader.startLoaderJob
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/streams
      name: streams
      description: Graph change stream operations
      operations:
      - method: GET
        name: get-propertygraph-stream
        description: Get property graph change stream records
        call: streams.getPropertygraphStream
        outputParameters:
        - type: object
          mapping: $.
