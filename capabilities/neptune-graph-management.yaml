naftiko: 1.0.0-alpha2
info:
  label: Amazon Neptune Graph Data Management
  description: Workflow capability for managing Neptune graph databases, executing queries across Gremlin, SPARQL, and openCypher,
    and monitoring data streams. Used by graph database administrators and developers.
  tags:
  - Amazon Neptune
  - AWS
  - Graph Database
  - Data Management
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_SIGV4_AUTH: AWS_SIGV4_AUTH
capability:
  consumes:
  - type: http
    namespace: management
    baseUri: https://rds.{region}.amazonaws.com
    description: Amazon Neptune Management API for creating, managing, and deleting Neptune DB clusters, instances, p
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_AUTH}}'
      placement: header
    resources:
    - name: db-clusters
      path: /db-clusters
      description: DB Clusters operations for Amazon Neptune Management API
      operations:
      - name: describeDBClusters
        method: GET
        description: Amazon Neptune Describe Neptune DB Clusters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
          description: Action
        - name: DBClusterIdentifier
          in: query
          type: string
          required: false
          description: The identifier of the DB cluster to describe.
        - name: MaxRecords
          in: query
          type: integer
          required: false
          description: Maximum number of records to include in the response (20-100).
        - name: Marker
          in: query
          type: string
          required: false
          description: Pagination token from a previous request.
        - name: Version
          in: query
          type: string
          required: true
          description: Version
      - name: createDBCluster
        method: POST
        description: Amazon Neptune Create a New Neptune DB Cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
          description: Action
        - name: Version
          in: query
          type: string
          required: true
          description: Version
        body:
          type: json
          data: {}
      - name: deleteDBCluster
        method: POST
        description: Amazon Neptune Delete a Neptune DB Cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
          description: Action
        - name: DBClusterIdentifier
          in: query
          type: string
          required: true
          description: The DB cluster identifier for the cluster to be deleted.
        - name: SkipFinalSnapshot
          in: query
          type: boolean
          required: false
          description: Whether to skip creation of a final snapshot before deletion.
        - name: FinalDBSnapshotIdentifier
          in: query
          type: string
          required: false
          description: The identifier of the final snapshot to create before deletion.
        - name: Version
          in: query
          type: string
          required: true
          description: Version
      - name: modifyDBCluster
        method: POST
        description: Amazon Neptune Modify a Neptune DB Cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
