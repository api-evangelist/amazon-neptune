          description: neptuneIamRoleArn
      - name: deleteInferenceEndpoint
        method: DELETE
        description: Amazon Neptune Delete an ML Inference Endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: id
        - name: clean
          in: query
          type: boolean
          required: false
          description: Whether to delete all related S3 artifacts.
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: neptuneIamRoleArn
  exposes:
  - type: rest
    port: 8081
    namespace: neptune-analytics-api
    description: Unified REST API for Neptune Analytics and ML.
    resources:
    - path: /v1/graphs
      name: analytics-graphs
      description: Neptune Analytics graph management
      operations:
      - method: GET
        name: list-analytics-graphs
        description: List Neptune Analytics graphs
        call: analytics.listGraphs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ml/jobs
      name: ml-jobs
      description: Neptune ML training job management
      operations:
      - method: GET
        name: list-ml-jobs
        description: List Neptune ML training jobs
        call: ml.listMLJobs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: neptune-analytics-mcp
    transport: http
    description: MCP server for AI-assisted Neptune Analytics and ML operations.
    tools:
    - name: list-analytics-graphs
      description: List Neptune Analytics graphs for in-memory graph analysis
      hints:
        readOnly: true
      call: analytics.listGraphs
      outputParameters:
      - type: object
        mapping: $.
    - name: create-analytics-graph
      description: Create a Neptune Analytics graph for graph analytics workloads
      hints:
        readOnly: false
      call: analytics.createGraph
      outputParameters:
      - type: object
        mapping: $.
    - name: list-ml-training-jobs
      description: List Neptune ML graph neural network training jobs
      hints:
        readOnly: true
      call: ml.listMLJobs
      outputParameters:
      - type: object
        mapping: $.
    - name: create-ml-inference-endpoint
      description: Create a Neptune ML inference endpoint for predictions
      hints:
        readOnly: false
      call: ml.createMLEndpoint
      outputParameters:
      - type: object
        mapping: $.
