naftiko: 1.0.0-alpha2
info:
  label: Amazon Neptune Analytics and Machine Learning
  description: Workflow capability for Neptune Analytics graph analysis, vector search, and Neptune ML graph neural network
    model training and inference. Used by data scientists and ML engineers.
  tags:
  - Amazon Neptune
  - AWS
  - Graph Analytics
  - Machine Learning
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_SIGV4_AUTH: AWS_SIGV4_AUTH
capability:
  consumes:
  - type: http
    namespace: analytics
    baseUri: https://neptune-graph.{region}.amazonaws.com
    description: Neptune Analytics is a memory-optimized graph database engine for analytics, providing optimized gra
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_AUTH}}'
      placement: header
    resources:
    - name: graphs
      path: /graphs
      description: Graphs operations for Amazon Neptune Neptune Analytics API
      operations:
      - name: listGraphs
        method: GET
        description: Amazon Neptune List Neptune Analytics Graphs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxResults
          in: query
          type: integer
          required: false
          description: Maximum number of results to return.
        - name: nextToken
          in: query
          type: string
          required: false
          description: Pagination token from a previous request.
      - name: createGraph
        method: POST
        description: Amazon Neptune Create a Neptune Analytics Graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getGraph
        method: GET
        description: Amazon Neptune Get Neptune Analytics Graph Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the graph.
      - name: updateGraph
        method: PATCH
        description: Amazon Neptune Update a Neptune Analytics Graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the graph.
        body:
          type: json
          data: {}
      - name: deleteGraph
        method: DELETE
        description: Amazon Neptune Delete a Neptune Analytics Graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the graph to delete.
        - name: skipSnapshot
          in: query
          type: boolean
          required: true
          description: Whether to skip creating a final snapshot before deletion.
      - name: resetGraph
        method: PUT
        description: Amazon Neptune Reset a Neptune Analytics Graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the graph to reset.
        body:
          type: json
          data: {}
    - name: graph-snapshots
      path: /graph-snapshots
      description: Graph Snapshots operations for Amazon Neptune Neptune Analytics API
      operations:
      - name: listGraphSnapshots
        method: GET
        description: Amazon Neptune List Graph Snapshots
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: query
          type: string
          required: false
          description: Filter snapshots by source graph identifier.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: maxResults
        - name: nextToken
          in: query
          type: string
          required: false
          description: nextToken
      - name: createGraphSnapshot
        method: POST
        description: Amazon Neptune Create a Graph Snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getGraphSnapshot
        method: GET
        description: Amazon Neptune Get Graph Snapshot Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: snapshotIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the snapshot.
      - name: deleteGraphSnapshot
        method: DELETE
        description: Amazon Neptune Delete a Graph Snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: snapshotIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the snapshot to delete.
      - name: restoreGraphFromSnapshot
        method: POST
        description: Amazon Neptune Restore a Graph from a Snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: snapshotIdentifier
          in: path
          type: string
          required: true
          description: The identifier of the snapshot to restore from.
        body:
          type: json
          data: {}
    - name: import-tasks
      path: /import-tasks
      description: Import Tasks operations for Amazon Neptune Neptune Analytics API
      operations:
      - name: listImportTasks
        method: GET
        description: Amazon Neptune List Import Tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxResults
          in: query
          type: integer
          required: false
          description: maxResults
        - name: nextToken
          in: query
          type: string
          required: false
          description: nextToken
      - name: createGraphUsingImportTask
        method: POST
        description: Amazon Neptune Create a Graph Using an Import Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getImportTask
        method: GET
        description: Amazon Neptune Get Import Task Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the import task.
      - name: cancelImportTask
        method: DELETE
        description: Amazon Neptune Cancel an Import Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the import task to cancel.
    - name: private-graph-endpoints
      path: /private-graph-endpoints
      description: Private Graph Endpoints operations for Amazon Neptune Neptune Analytics API
      operations:
      - name: listPrivateGraphEndpoints
        method: GET
        description: Amazon Neptune List Private Graph Endpoints
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: graphIdentifier
        - name: maxResults
          in: query
          type: integer
          required: false
          description: maxResults
        - name: nextToken
          in: query
          type: string
          required: false
          description: nextToken
      - name: createPrivateGraphEndpoint
        method: POST
        description: Amazon Neptune Create a Private Graph Endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: The unique identifier of the graph.
        body:
          type: json
          data: {}
      - name: getPrivateGraphEndpoint
        method: GET
        description: Amazon Neptune Get Private Graph Endpoint Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: graphIdentifier
        - name: vpcId
          in: path
          type: string
          required: true
          description: The VPC ID of the private endpoint.
      - name: deletePrivateGraphEndpoint
        method: DELETE
        description: Amazon Neptune Delete a Private Graph Endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: graphIdentifier
          in: path
          type: string
          required: true
          description: graphIdentifier
        - name: vpcId
          in: path
          type: string
          required: true
          description: vpcId
  - type: http
    namespace: ml
    baseUri: https://{cluster-endpoint}:8182
    description: 'Neptune ML enables machine learning on graph data using graph neural networks. It provides APIs for '
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_AUTH}}'
      placement: header
    resources:
    - name: data-processing
      path: /data-processing
      description: Data Processing operations for Amazon Neptune Neptune ML API
      operations:
      - name: listDataProcessingJobs
        method: GET
        description: Amazon Neptune List Active Data Processing Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxItems
          in: query
          type: integer
          required: false
          description: Maximum number of items to return (default 10, max 1024).
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: The ARN of the IAM role for Neptune access.
      - name: createDataProcessingJob
        method: POST
        description: Amazon Neptune Create an ML Data Processing Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getDataProcessingJobStatus
        method: GET
        description: Amazon Neptune Get Data Processing Job Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The unique identifier of the data processing job.
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: The ARN of the IAM role for Neptune access.
      - name: stopDataProcessingJob
        method: DELETE
        description: Amazon Neptune Stop a Data Processing Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The unique identifier of the data processing job.
        - name: clean
          in: query
          type: boolean
          required: false
          description: Whether to delete all S3 artifacts when stopping.
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: The ARN of the IAM role for Neptune access.
    - name: model-training
      path: /model-training
      description: Model Training operations for Amazon Neptune Neptune ML API
      operations:
      - name: listModelTrainingJobs
        method: GET
        description: Amazon Neptune List Active Model Training Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxItems
          in: query
          type: integer
          required: false
          description: Maximum number of items to return (default 10, max 1024).
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: neptuneIamRoleArn
      - name: createModelTrainingJob
        method: POST
        description: Amazon Neptune Create an ML Model Training Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getModelTrainingJobStatus
        method: GET
        description: Amazon Neptune Get Model Training Job Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The unique identifier of the model training job.
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: neptuneIamRoleArn
      - name: stopModelTrainingJob
        method: DELETE
        description: Amazon Neptune Stop a Model Training Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: id
        - name: clean
          in: query
          type: boolean
          required: false
          description: clean
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: neptuneIamRoleArn
    - name: model-transform
      path: /model-transform
      description: Model Transform operations for Amazon Neptune Neptune ML API
      operations:
      - name: listModelTransformJobs
        method: GET
        description: Amazon Neptune List Active Model Transform Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxItems
          in: query
          type: integer
          required: false
          description: maxItems
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: neptuneIamRoleArn
      - name: createModelTransformJob
        method: POST
        description: Amazon Neptune Create an ML Model Transform Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getModelTransformJobStatus
        method: GET
        description: Amazon Neptune Get Model Transform Job Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: id
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: neptuneIamRoleArn
      - name: stopModelTransformJob
        method: DELETE
        description: Amazon Neptune Stop a Model Transform Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: id
        - name: clean
          in: query
          type: boolean
          required: false
          description: clean
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: neptuneIamRoleArn
    - name: inference-endpoints
      path: /inference-endpoints
      description: Inference Endpoints operations for Amazon Neptune Neptune ML API
      operations:
      - name: listInferenceEndpoints
        method: GET
        description: Amazon Neptune List ML Inference Endpoints
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxItems
          in: query
          type: integer
          required: false
          description: maxItems
        - name: neptuneIamRoleArn
          in: query
          type: string
          required: false
          description: neptuneIamRoleArn
      - name: createInferenceEndpoint
        method: POST
        description: Amazon Neptune Create an ML Inference Endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: getInferenceEndpointStatus
        method: GET
        description: Amazon Neptune Get ML Inference Endpoint Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
