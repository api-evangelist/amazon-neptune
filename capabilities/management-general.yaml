naftiko: 1.0.0-alpha2
info:
  label: Amazon Neptune Management API
  description: 'Amazon Neptune Management API. 2 operations. Lead operation: Amazon Neptune Add Tags to a Neptune Resource.
    Self-contained Naftiko capability covering one Amazon Neptune business surface.'
  tags:
  - Amazon Neptune
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_NEPTUNE_API_KEY: AMAZON_NEPTUNE_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-general
    baseUri: https://rds.{region}.amazonaws.com
    description: Amazon Neptune Management API business capability. Self-contained, no shared references.
    resources:
    - name: ?Action=AddTagsToResource
      path: /?Action=AddTagsToResource
      operations:
      - name: addtagstoresource
        method: POST
        description: Amazon Neptune Add Tags to a Neptune Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
        - name: ResourceName
          in: query
          type: string
          description: The ARN of the resource to add tags to.
          required: true
        - name: Version
          in: query
          type: string
          required: true
    - name: ?Action=ListTagsForResource
      path: /?Action=ListTagsForResource
      operations:
      - name: listtagsforresource
        method: GET
        description: Amazon Neptune List Tags for a Neptune Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
        - name: ResourceName
          in: query
          type: string
          description: The ARN of the resource to list tags for.
          required: true
        - name: Version
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_NEPTUNE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: management-general-rest
    port: 8080
    description: REST adapter for Amazon Neptune Management API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/action-addtagstoresource
      name: action-addtagstoresource
      description: REST surface for ?Action=AddTagsToResource.
      operations:
      - method: POST
        name: addtagstoresource
        description: Amazon Neptune Add Tags to a Neptune Resource
        call: management-general.addtagstoresource
        with:
          Action: rest.Action
          ResourceName: rest.ResourceName
          Version: rest.Version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/action-listtagsforresource
      name: action-listtagsforresource
      description: REST surface for ?Action=ListTagsForResource.
      operations:
      - method: GET
        name: listtagsforresource
        description: Amazon Neptune List Tags for a Neptune Resource
        call: management-general.listtagsforresource
        with:
          Action: rest.Action
          ResourceName: rest.ResourceName
          Version: rest.Version
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Neptune Management API. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-neptune-add-tags-neptune
      description: Amazon Neptune Add Tags to a Neptune Resource
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-general.addtagstoresource
      with:
        Action: tools.Action
        ResourceName: tools.ResourceName
        Version: tools.Version
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-neptune-list-tags-neptune
      description: Amazon Neptune List Tags for a Neptune Resource
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-general.listtagsforresource
      with:
        Action: tools.Action
        ResourceName: tools.ResourceName
        Version: tools.Version
      outputParameters:
      - type: object
        mapping: $.
