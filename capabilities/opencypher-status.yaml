        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: cancelopencypherquery
        description: Amazon Neptune Cancel a Running OpenCypher Query
        call: opencypher-status.cancelopencypherquery
        with:
          queryId: rest.queryId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
