specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Amazon Neptune
providerId: amazon-neptune
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - AWS
  - Database
  - Graph Database
  - Cost Management
description: 'FOCUS-aligned FinOps for Amazon Neptune: per-instance-hour plus storage/IO (Standard) or
  bundled (I/O-Optimized) on the provisioned model, NCU-second billing on Serverless, and separate backup
  storage charges.'
sources:
  - https://aws.amazon.com/neptune/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Amazon Web Services, Inc.
serviceCategory: Database / Graph
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
focusColumns:
  ServiceName: Amazon Neptune
  ServiceCategory: Databases
  ServiceSubcategory: Graph Database
  ProviderName: AWS
  PublisherName: Amazon Web Services, Inc.
  InvoiceIssuerName: Amazon Web Services, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: instance_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - region
      - cluster
      - instance_class
      - storage_config
  - name: storage_gb_month
    unit: GB-month
    aggregation: sum
    dimensions:
      - region
      - cluster
      - storage_config
  - name: io_requests
    unit: million-requests
    aggregation: sum
    dimensions:
      - region
      - cluster
  - name: ncu_seconds
    unit: NCU-second
    aggregation: sum
    dimensions:
      - region
      - cluster
  - name: backup_storage_gb_month
    unit: GB-month
    aggregation: sum
    dimensions:
      - region
      - cluster
  - name: data_transfer_gb
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - direction
principles:
  - name: Visibility
    description: Use CloudWatch Neptune metrics (CPUUtilization, GremlinRequestsPerSec, MainRequestQueuePendingRequests),
      Performance Insights, and AWS CUR / FOCUS export.
  - name: Allocation
    description: Tag clusters with Application, Team, Environment; enable cost allocation tags so charges
      flow into FOCUS columns.
  - name: Optimization
    description: Right-size instance class; choose Standard vs I/O-Optimized based on monthly IO; use Serverless
      for variable workloads; pause dev/test clusters; commit to Reserved Instances at 1- or 3-year for
      steady production.
  - name: Accountability
    description: Set AWS Budgets per cluster tag, alert on storage growth and IO spikes, review monthly
      utilization for downsizing.
